name: Celebrity Cruise Price Monitor

on:
  schedule:
    # 每天 UTC 00:00 執行 (換算台北時間為早上 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許在 GitHub 介面上手動點擊執行

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install playwright requests
        
    - name: 安裝 Playwright 瀏覽器核心
      run: |
        playwright install chromium --with-deps

    - name: 執行監控程式
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        python monitor.py
